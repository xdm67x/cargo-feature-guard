name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          cargo install cargo-zigbuild
          pip3 install ziglang

      - name: Build (zigbuild)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cargo-feature-guard-${{ matrix.target }}.tar.gz cargo-feature-guard
          cd ../../..

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../cargo-feature-guard-${{ matrix.target }}.zip cargo-feature-guard.exe
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: cargo-feature-guard-${{ matrix.target }}
          path: cargo-feature-guard-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: cargo-feature-guard-*
          generate_release_notes: true

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          REPO="https://github.com/xdm67x/cargo-feature-guard/releases/download/${GITHUB_REF_NAME}"

          SHA_MACOS_ARM=$(sha256sum cargo-feature-guard-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_LINUX_X86=$(sha256sum cargo-feature-guard-x86_64-unknown-linux-musl.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum cargo-feature-guard-aarch64-unknown-linux-musl.tar.gz | awk '{print $1}')

          cat > cargo-feature-guard.rb << FORMULA
          class CargoFeatureGuard < Formula
            desc "Validate Cargo feature propagation, detect forbidden features, and find duplicate dependencies"
            homepage "https://github.com/xdm67x/cargo-feature-guard"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${REPO}/cargo-feature-guard-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              end
            end

            on_linux do
              on_arm do
                url "${REPO}/cargo-feature-guard-aarch64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "${REPO}/cargo-feature-guard-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "cargo-feature-guard"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/cargo-feature-guard --version")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' cargo-feature-guard.rb

      - name: Push to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/xdm67x/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp cargo-feature-guard.rb tap/Formula/

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/cargo-feature-guard.rb
          git diff --cached --quiet && echo "Formula unchanged" && exit 0
          git commit -m "cargo-feature-guard ${GITHUB_REF_NAME}"
          git push
