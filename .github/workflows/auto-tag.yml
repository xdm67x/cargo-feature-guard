name: Auto Tag

# Runs on every push to main. If the commit message matches the release PR
# pattern ("chore: release vX.Y.Z"), it creates and pushes the corresponding
# git tag, which triggers the release.yml workflow (build + publish).
#
# IMPORTANT: GitHub Actions does not fire workflow triggers for events created
# with GITHUB_TOKEN. If release.yml does not trigger after the tag is pushed,
# replace the GITHUB_TOKEN usage below with a PAT (stored as a repository
# secret, e.g. RELEASE_PAT) that has "Contents: write" scope, and pass it to
# both the checkout `token:` input and the git push command.
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag-release:
    # Only run when the head commit looks like a release PR merge
    if: "${{ contains(github.event.head_commit.message, 'release-v') || startsWith(github.event.head_commit.message, 'chore: release v') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history needed so we can push tags
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"
          echo "Extracted version: $VERSION  (tag: $TAG)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"

      - name: Check that tag does not already exist
        id: tag-check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists on remote — skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG does not exist yet — will create."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          echo "Pushed tag $TAG — release.yml will now trigger."
